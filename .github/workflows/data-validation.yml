name: Data Validation

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate grammar data
        run: python3 validate_anki_data.py
      - name: Validate point taxonomy mapping
        run: python3 validate_grammar_taxonomy.py
