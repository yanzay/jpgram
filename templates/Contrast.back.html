<!-- Contrast.back.html
     Shows: JP text, highlight correct Answer (A or B), Why reasoning, Tip hint
     Fields: JP, OptionA, OptionB, Answer, Why, Tip, Audio, Tags
  -->

<div class="card back-section">
  <div class="main-content">
    <!-- JP text with answer filled in; trailing English hint split out -->
    <div class="jp jp-large" id="contrast-jp-back">{{JP}}</div>
    <div id="contrast-ctx-back" style="display:none;font-size:0.85em;color:var(--muted);font-style:italic;margin-top:0.3em;"></div>
    <script>
    (function(){
      var el=document.getElementById('contrast-jp-back');
      var ctx=document.getElementById('contrast-ctx-back');
      var m=el.textContent.match(/^([\s\S]+?)\s*\(([A-Za-z][^)]*)\)\s*$/);
      if(m){el.textContent=m[1];ctx.textContent='('+m[2]+')';ctx.style.display='block';}
    })();
    </script>
  </div>

  <!-- Show both options; JS highlights the one that matches Answer -->
  <div style="display: flex; gap: 1em; margin-top: 1.5em; flex-wrap: wrap;">
    <div id="opt-a" style="flex: 1; min-width: 120px; padding: 1em; border-radius: 0.5em; border: 2px solid var(--border); text-align: center;">
      <div style="font-size: 0.85em; color: var(--muted); margin-bottom: 0.25em;">Option A <span id="opt-a-badge" style="display:none; color: var(--success); font-weight: 600;">✓ Correct</span></div>
      <div class="jp" style="font-size: 1.3em; font-weight: 600;">{{OptionA}}</div>
    </div>

    <div id="opt-b" style="flex: 1; min-width: 120px; padding: 1em; border-radius: 0.5em; border: 2px solid var(--border); text-align: center;">
      <div style="font-size: 0.85em; color: var(--muted); margin-bottom: 0.25em;">Option B <span id="opt-b-badge" style="display:none; color: var(--success); font-weight: 600;">✓ Correct</span></div>
      <div class="jp" style="font-size: 1.3em; font-weight: 600;">{{OptionB}}</div>
    </div>
  </div>

  <script>
  (function(){
    var answer = "{{Answer}}".trim();
    var optA   = "{{OptionA}}".trim();
    var optB   = "{{OptionB}}".trim();
    function highlight(boxId, badgeId) {
      var box = document.getElementById(boxId);
      var badge = document.getElementById(badgeId);
      if (box)   { box.style.background = 'var(--success-light)'; box.style.borderColor = 'var(--success)'; }
      if (badge) { badge.style.display = 'inline'; }
    }
    if (answer && answer === optA) { highlight('opt-a', 'opt-a-badge'); }
    if (answer && answer === optB) { highlight('opt-b', 'opt-b-badge'); }
  })();
  </script>

  <!-- Why: explanation of the correct choice -->
  {{#Why}}
  <div class="info-box" style="margin-top: 1.5em;">
    <strong>Why is this correct?</strong>
    <div style="margin-top: 0.5em;">{{Why}}</div>
  </div>
  {{/Why}}

  <!-- Tip: additional hint or gotcha -->
  {{#Tip}}
  <div class="warning-box">
    <strong>💡 Tip:</strong> {{Tip}}
  </div>
  {{/Tip}}

  <!-- Audio replay button -->
  {{#Audio}}
  <div style="margin-top: 1.5em;">
    <button class="audio-button" onclick="if(this.getElementsByTagName('audio')[0]){this.getElementsByTagName('audio')[0].play()}">
      {{Audio}}
    </button>
  </div>
  {{/Audio}}

  <!-- Tags row -->
  {{#Tags}}
  <div class="tags">
    {{Tags}}
  </div>
  {{/Tags}}
</div>
