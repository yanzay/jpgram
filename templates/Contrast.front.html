<!-- Contrast.front.html
     Presents: JP with blank (___), OptionA and OptionB as side-by-side visual buttons
     Fields: JP, OptionA, OptionB, Answer, Why, Tip, Audio, Tags
  -->

<div class="card front-section">
  <div class="main-content">
    <!-- JP text with visible blank (___); trailing English hint split out below -->
    <div class="jp jp-large" id="contrast-jp-front">{{JP}}</div>
    <div id="contrast-ctx-front" style="display:none;font-size:0.85em;color:var(--muted);font-style:italic;margin-top:0.3em;"></div>
    <script>
    (function(){
      var el=document.getElementById('contrast-jp-front');
      var ctx=document.getElementById('contrast-ctx-front');
      var m=el.textContent.match(/^([\s\S]+?)\s*\(([A-Za-z][^)]*)\)\s*$/);
      if(m){el.textContent=m[1];ctx.textContent='('+m[2]+')';ctx.style.display='block';}
    })();
    </script>

    <!-- Question prompt -->
    <div style="font-size: 0.95em; color: var(--muted); margin-top: 0.75em;">
      Which word or form is correct?
    </div>
  </div>

  <!-- Option A and B as side-by-side visual buttons (not actually clickable) -->
  <div style="display: flex; gap: 1em; margin-top: 1.5em; flex-wrap: wrap;">
    <div style="flex: 1; min-width: 120px; padding: 1em; background: var(--muted-light); border-radius: 0.5em; border: 2px solid transparent; text-align: center;">
      <div style="font-size: 0.85em; color: var(--muted); margin-bottom: 0.25em;">Option A</div>
      <div class="jp" style="font-size: 1.3em; font-weight: 600;">{{OptionA}}</div>
    </div>

    <div style="flex: 1; min-width: 120px; padding: 1em; background: var(--muted-light); border-radius: 0.5em; border: 2px solid transparent; text-align: center;">
      <div style="font-size: 0.85em; color: var(--muted); margin-bottom: 0.25em;">Option B</div>
      <div class="jp" style="font-size: 1.3em; font-weight: 600;">{{OptionB}}</div>
    </div>
  </div>

</div>
